services:
  - type: web
    name: blog-automation
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DB_PATH
        value: /data/blog.db
      - key: MODEL
        value: claude-sonnet-4-6
      - key: ANTHROPIC_API_KEY
        sync: false          # 대시보드에서 직접 입력
    disk:
      name: blog-data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /health
    autoDeploy: true
